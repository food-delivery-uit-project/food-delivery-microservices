apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: jwt-to-headers
  namespace: food-app
config:
  access:
    - |
      local jwt = require "resty.jwt"
      local auth_header = kong.request.get_header("Authorization")
      kong.request.clear_header("X-User-Id")
      kong.request.clear_header("X-User-Role")
      if auth_header then
        local token = string.match(auth_header, "Bearer%s+(.+)")
        if token then
          local jwt_obj = jwt:load_jwt(token)
          if jwt_obj and jwt_obj.valid and jwt_obj.payload then
            kong.service.request.set_header("X-User-Id", jwt_obj.payload.sub)
            kong.service.request.set_header("X-User-Role", jwt_obj.payload.role)
          end
        end
      end
plugin: pre-function
