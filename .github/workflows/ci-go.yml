name: CI - Go Services
on:
  pull_request:
    paths:
      - ".github/workflows/ci-go.yml"
      - "services/dispatch-service/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci-go.yml"
      - "services/dispatch-service/**"

permissions:
  contents: write

env:
  GO_VERSION: "1.24"
  REGISTRY: acrfooddelivery.azurecr.io
  SERVICE: dispatch-service

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/${{ env.SERVICE }}/go.sum

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: services/${{ env.SERVICE }}

      - name: Unit Tests
        working-directory: services/${{ env.SERVICE }}
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload Coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: services/${{ env.SERVICE }}/coverage.out

      - name: Build Docker Image
        working-directory: services/${{ env.SERVICE }}
        run: docker build -t ${{ env.REGISTRY }}/${{ env.SERVICE }}:${{ github.sha }} .

      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.SERVICE }}:${{ github.sha }}
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Push to ACR
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          az acr login --name acrfooddelivery
          docker push ${{ env.REGISTRY }}/${{ env.SERVICE }}:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.SERVICE }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.SERVICE }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.SERVICE }}:latest

  update-helm:
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Update Helm values
        run: yq e ".image.tag = \"${{ github.sha }}\"" -i deployments/helm/charts/${{ env.SERVICE }}/values.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/helm/
          git commit -m "chore(ci): update dispatch-service image to ${{ github.sha }}" || exit 0
          for i in {1..5}; do
            git pull --rebase origin main
            git push && break || sleep $((RANDOM % 10 + 5))
          done
