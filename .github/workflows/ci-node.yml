name: CI - Node.js Services
on:
  pull_request:
    paths:
      - "services/notification-service/**"
  push:
    branches: [main]
    paths:
      - "services/notification-service/**"

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  REGISTRY: acrfooddelivery.azurecr.io
  SERVICE: notification-service

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: services/${{ env.SERVICE }}/package-lock.json

      - name: Install Dependencies
        working-directory: services/${{ env.SERVICE }}
        run: npm ci

      - name: Lint (ESLint)
        working-directory: services/${{ env.SERVICE }}
        run: npm run lint

      - name: Unit Tests
        working-directory: services/${{ env.SERVICE }}
        run: npm test -- --coverage

      - name: Build TypeScript
        working-directory: services/${{ env.SERVICE }}
        run: npm run build

      - name: Build Docker Image
        working-directory: services/${{ env.SERVICE }}
        run: docker build -t ${{ env.REGISTRY }}/${{ env.SERVICE }}:${{ github.sha }} .

      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.SERVICE }}:${{ github.sha }}
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Push to ACR
        if: github.ref == 'refs/heads/main'
        run: |
          az acr login --name acrfooddelivery
          docker push ${{ env.REGISTRY }}/${{ env.SERVICE }}:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.SERVICE }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.SERVICE }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.SERVICE }}:latest

  update-helm:
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Update Helm values
        run: yq e ".image.tag = \"${{ github.sha }}\"" -i deployments/helm/charts/${{ env.SERVICE }}/values.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/helm/
          git commit -m "chore(ci): update notification-service image to ${{ github.sha }}" || exit 0
          git push
