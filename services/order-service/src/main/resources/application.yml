server:
  port: 8080

spring:
  application:
    name: order-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/order_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: order-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# Internal service URLs (K8s DNS or localhost for dev)
internal:
  restaurant-service-url: ${RESTAURANT_SERVICE_URL:http://localhost:8082}
  user-service-url: ${USER_SERVICE_URL:http://localhost:8081}

# Outbox relay polling interval
outbox:
  polling-interval-ms: ${OUTBOX_POLLING_INTERVAL:1000}

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      restaurant-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      user-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
  retry:
    instances:
      restaurant-service:
        max-attempts: 3
        wait-duration: 500ms
      user-service:
        max-attempts: 3
        wait-duration: 500ms
  timelimiter:
    instances:
      restaurant-service:
        timeout-duration: 3s
      user-service:
        timeout-duration: 3s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: order-service
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    console: "%msg%n"
  level:
    root: INFO
    com.fooddelivery.order: DEBUG
