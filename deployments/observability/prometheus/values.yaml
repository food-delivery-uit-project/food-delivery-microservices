## kube-prometheus-stack Helm values
## Deploy: helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
##           -n observability -f deployments/observability/prometheus/values.yaml

grafana:
  enabled: false   # We deploy Grafana separately via grafana/grafana chart for more control

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

prometheus:
  prometheusSpec:
    ## Scrape interval
    scrapeInterval: "15s"
    evaluationInterval: "15s"
    retention: "7d"

    ## Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    ## Allow ServiceMonitors from any namespace
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    ## Allow PodMonitors from any namespace
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}

    ## Allow PrometheusRules from any namespace
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}

    ## Additional scrape configs (for services without ServiceMonitor)
    additionalScrapeConfigs:
      - job_name: 'food-delivery-java-services'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['food-app']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      - job_name: 'food-delivery-go-service'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['food-app']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: dispatch-service
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service

## Default rules
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: false
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: false
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

## Node exporter
nodeExporter:
  enabled: true

## kube-state-metrics
kubeStateMetrics:
  enabled: true
