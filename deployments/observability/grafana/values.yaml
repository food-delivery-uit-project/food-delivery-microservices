## Grafana Helm values
## Deploy: helm upgrade --install grafana grafana/grafana \
##           -n observability -f deployments/observability/grafana/values.yaml

adminUser: admin
adminPassword: food-delivery-admin  # Change in production!

replicas: 1

persistence:
  enabled: true
  size: 2Gi

service:
  type: ClusterIP
  port: 3000

## Init containers to load dashboards
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: ALL
    folderAnnotation: grafana_folder
    provider:
      foldersFromFilesStructure: true
  datasources:
    enabled: true
    label: grafana_datasource
    labelValue: "1"
    searchNamespace: ALL

## Pre-configured datasources
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://kube-prometheus-stack-prometheus.observability.svc:9090
        isDefault: true
        access: proxy
        jsonData:
          timeInterval: "15s"

      - name: Loki
        type: loki
        uid: loki
        url: http://loki.observability.svc:3100
        access: proxy
        jsonData:
          maxLines: 1000
          derivedFields:
            - datasourceUid: jaeger
              matcherRegex: '"trace_id":"([^"]+)"'
              name: TraceID
              url: '$${__value.raw}'

      - name: Jaeger
        type: jaeger
        uid: jaeger
        url: http://jaeger-query.observability.svc:16686
        access: proxy

## Dashboard provisioning via ConfigMaps
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'food-delivery'
        orgId: 1
        folder: 'Food Delivery'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/food-delivery

## Import community dashboards
dashboards:
  default:
    kubernetes-cluster:
      gnetId: 7249
      revision: 1
      datasource: Prometheus
    kafka-overview:
      gnetId: 7589
      revision: 5
      datasource: Prometheus
    jvm-micrometer:
      gnetId: 4701
      revision: 14
      datasource: Prometheus

grafana.ini:
  server:
    root_url: "http://localhost:3000"
  analytics:
    reporting_enabled: false
  auth.anonymous:
    enabled: false
  unified_alerting:
    enabled: true
