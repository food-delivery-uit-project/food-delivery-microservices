server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      ## Only collect logs from food-delivery containers (fd- prefix)
      - source_labels: [__meta_docker_container_name]
        regex: /fd-.+
        action: keep
      ## Use container name as the log stream label
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
        replacement: $1
      ## Add service label from container name (strip fd- prefix)
      - source_labels: [__meta_docker_container_name]
        regex: /fd-(.+)
        target_label: service
        replacement: $1
    pipeline_stages:
      ## Parse JSON logs (all our services output structured JSON)
      - json:
          expressions:
            level: level
            message: msg
            trace_id: trace_id
            span_id: span_id
            service: service
            order_id: order_id
            duration_ms: duration_ms
      ## Set log level as a label for filtering
      - labels:
          level:
          service:
      ## Use message field as the log line
      - output:
          source: message
