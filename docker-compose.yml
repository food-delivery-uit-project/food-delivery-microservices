# Local development infrastructure
# Usage: docker compose up -d
# This starts the shared infrastructure services needed by all microservices.
# Individual microservices run directly (./mvnw spring-boot:run, go run, npx tsx).

services:
  postgres:
    image: postgres:16-alpine
    container_name: fd-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fd-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: fd-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-init:
    image: bitnamilegacy/kafka:3.7
    container_name: fd-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics.sh --bootstrap-server kafka:9094 --create --if-not-exists --topic order-events --partitions 6 --replication-factor 1
      kafka-topics.sh --bootstrap-server kafka:9094 --create --if-not-exists --topic payment-events --partitions 6 --replication-factor 1
      kafka-topics.sh --bootstrap-server kafka:9094 --create --if-not-exists --topic restaurant-events --partitions 6 --replication-factor 1
      kafka-topics.sh --bootstrap-server kafka:9094 --create --if-not-exists --topic delivery-events --partitions 6 --replication-factor 1
      echo 'Topics created:'
      kafka-topics.sh --bootstrap-server kafka:9094 --list
      "

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: fd-user-service
    ports:
      - "8001:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9094
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  restaurant-service:
    build:
      context: ./services/restaurant-service
      dockerfile: Dockerfile
    container_name: fd-restaurant-service
    ports:
      - "8002:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/restaurant_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9094
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  kafka_data:
